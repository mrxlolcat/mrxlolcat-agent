name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm run build
      env:
        NEXT_PUBLIC_PROJECT_ID: ${{ secrets.PROJECT_ID }}
        LIFI_API_KEY: ${{ secrets.LIFI_API_KEY }}
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
